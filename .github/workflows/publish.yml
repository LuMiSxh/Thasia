name: publish

on:
    workflow_dispatch:
        inputs:
            tag:
                description: Release tag, for example v0.4.1
                required: true
                type: string

env:
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: '0'

jobs:
    validate:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Verify tag and workspace
              shell: bash
              run: |
                  cargo_version="$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
                  tag_version="${{ inputs.tag }}"
                  tag_version="${tag_version#v}"
                  test "$cargo_version" = "$tag_version"
                  cargo check --workspace
                  cargo run -p thasia-dist -- check-icons

    build:
        needs: validate
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: macos-14
                      target: aarch64-apple-darwin
                    - os: macos-13
                      target: x86_64-apple-darwin
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                    - os: ubuntu-22.04
                      target: x86_64-unknown-linux-gnu
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libfontconfig1-dev libxkbcommon-dev libwayland-dev libx11-xcb-dev libxcb-shape0-dev libxcb-xfixes0-dev nasm cmake lld
            - name: Install macOS dependencies
              if: runner.os == 'macOS'
              run: brew install nasm cmake
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}
            - uses: swatinem/rust-cache@v2
            - uses: taiki-e/upload-rust-binary-action@v1
              with:
                  bin: thasia-gpui
                  target: ${{ matrix.target }}
                  archive: thasia-$tag-$target
                  token: ${{ secrets.GITHUB_TOKEN }}

    manifest:
        needs: build
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - name: Generate manifest
              run: cargo run -p thasia-dist -- manifest --version "${{ inputs.tag }}"
            - uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ inputs.tag }}
                  draft: true
                  files: update-manifest.json
