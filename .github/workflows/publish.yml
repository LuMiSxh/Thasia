name: 'publish'

on:
    workflow_dispatch:
        inputs:
            tag:
                description: 'Release tag (e.g. v0.3.0) — must match workspace version'
                required: true
                type: string

env:
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: '0'

jobs:
    validate:
        permissions:
            contents: read
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Verify tag matches workspace version
              shell: bash
              run: |
                  cargo_version="$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
                  tag_version="${{ inputs.tag }}"
                  tag_version="${tag_version#v}"
                  if [ "$cargo_version" != "$tag_version" ]; then
                    echo "::error::Tag version ($tag_version) does not match workspace version ($cargo_version)"
                    exit 1
                  fi

    publish-thasia:
        needs: validate
        permissions:
            contents: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: 'macos-latest' # Apple Silicon
                      args: '--target aarch64-apple-darwin'
                    - platform: 'ubuntu-22.04' # Linux
                      args: ''
                    - platform: 'windows-latest' # Windows
                      args: ''

        runs-on: ${{ matrix.platform }}
        steps:
            - uses: actions/checkout@v6

            - name: install dependencies (ubuntu only)
              if: matrix.platform == 'ubuntu-22.04'
              run: |
                  sudo apt-get update
                  # webkit2gtk-4.1 is required for Tauri v2
                  sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf nasm cmake lld

            - name: install dependencies (macOS only)
              if: matrix.platform == 'macos-latest'
              # nasm is required for rav1e (AVIF encoding); cmake is required for AVIF decode fallback.
              run: |
                  brew install nasm cmake

            - name: Configure long paths for Windows
              if: matrix.platform == 'windows-latest'
              run: git config --system core.longpaths true
              shell: bash

            - name: setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: latest

            - name: setup node
              uses: actions/setup-node@v6
              with:
                  node-version: lts/*
                  cache: 'pnpm'

            - name: install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}
                  components: llvm-tools-preview

            - name: Verify CMake is available
              run: cmake --version

            - name: Rust cache
              uses: swatinem/rust-cache@v2
              with:
                  workspaces: '. -> target'
                  cache-on-failure: true

            - name: install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Extract changelog for this version
              id: changelog
              shell: bash
              run: |
                  version="${{ inputs.tag }}"
                  version="${version#v}"
                  awk "/^## \[${version}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
                  if [ ! -s release_notes.md ]; then
                    echo "Thasia ${{ inputs.tag }}" > release_notes.md
                  fi
                  {
                    echo 'notes<<EOF'
                    cat release_notes.md
                    echo EOF
                  } >> "$GITHUB_OUTPUT"

            - name: Build & Publish Tauri App
              uses: tauri-apps/tauri-action@v0
              id: tauri_build
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tagName: ${{ inputs.tag }}
                  releaseName: 'Thasia ${{ inputs.tag }}'
                  releaseBody: ${{ steps.changelog.outputs.notes }}
                  releaseDraft: true
                  prerelease: false
                  args: ${{ matrix.args }}
